name: CI-BASIC

# build가 되는지 확인

on:
  push:
    branches: [ main , dev ]
  pull_request:
    branches: [ main , dev ]
  workflow_dispatch: # 수동으로 적용 가능

concurrency:
  group: sanity-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Check Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "21"
          cache: "gradle"

      - name: check if builds
        run: |
          chmod +x gradlew
          ./gradlew build -x test
